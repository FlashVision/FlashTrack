# FlashTrack-m with LoRA fine-tuning

model:
  backbone_size: "1.0x"
  reid_dim: 128
  encoder_channels: 256
  input_size: [128, 64]
  num_ids: 500

data:
  train_images: data/MOT17/train
  val_images: data/MOT17/val
  num_workers: 4

train:
  epochs: 50
  batch_size: 64
  learning_rate: 0.001
  weight_decay: 0.0005
  warmup_epochs: 3
  val_interval: 5
  save_dir: workspace/flashtrack_m_lora

  use_lora: true
  lora_rank: 8
  lora_alpha: 16.0
  lora_dropout: 0.05
  lora_target_modules: [backbone, encoder]

  triplet_weight: 1.0
  classification_weight: 0.5
  triplet_margin: 0.3

augment:
  flip_prob: 0.5
  random_erasing_prob: 0.5
