# FlashTrack-m-0.5x: Smallest model (ShuffleNetV2 0.5x)

model:
  backbone_size: "0.5x"
  reid_dim: 128
  encoder_channels: 128
  input_size: [128, 64]
  num_ids: 500

data:
  train_images: data/MOT17/train
  val_images: data/MOT17/val
  num_workers: 4

train:
  epochs: 150
  batch_size: 128
  learning_rate: 0.0005
  weight_decay: 0.0005
  warmup_epochs: 5
  val_interval: 5
  save_dir: workspace/flashtrack_m05x

  triplet_weight: 1.0
  classification_weight: 0.5
  triplet_margin: 0.3

augment:
  flip_prob: 0.5
  random_erasing_prob: 0.5
